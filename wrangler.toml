name = "iwata-monogatari"
compatibility_date = "2026-06-24"
pages_build_output_dir = "."

# ============================================================
# Cloudflare D1（掲示板の保存先）
# 重要: D1作成までは下のブロックをコメントアウトのままにしてください。
#       仮の database_id のままだと Pages のビルドが失敗します。
#
# 手順:
#   1) wrangler d1 create iwata_monogatari_bbs
#   2) 出力された database_id を下に貼り付ける
#   3) 下4行の先頭 "# " を外して有効化し、コミット
#   （または Cloudflare ダッシュボードの Pages → Settings → Functions →
#     D1 database bindings で binding 名 "DB" として設定してもよい）
# ============================================================
# [[d1_databases]]
# binding = "DB"
# database_name = "iwata_monogatari_bbs"
# database_id = "ここに実際のIDを貼る"

# 環境変数（Secrets はダッシュボードまたは `wrangler pages secret put` で設定する。
# wrangler.toml には秘密情報を直接書かないこと）
# 必要な変数:
#   RESEND_API_KEY        … 投稿通知メール用（Resend）
#   BBS_NOTIFY_TO         … fudosan.fujigaokas@gmail.com
#   BBS_NOTIFY_FROM       … 認証済み送信元アドレス（例: bbs@あなたのドメイン）
#   TURNSTILE_SECRET_KEY  … Cloudflare Turnstile のシークレット
#   BBS_ADMIN_TOKEN       … 管理画面/管理APIの簡易保護トークン
#   BBS_IP_SALT           … IPハッシュ用ソルト（任意の長いランダム文字列）

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img"
     aria-label="見付地区の旧東海道・宿場・寺社・学校の記憶を表した模式図">
  <defs>
    <linearGradient id="mskSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3fafd"/>
      <stop offset="1" stop-color="#fffdf7"/>
    </linearGradient>
    <linearGradient id="mskRoad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfe3ee"/>
      <stop offset="1" stop-color="#aecbdd"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#mskSky)"/>

  <!-- 抽象的な台地・地形の等高線（地理を正確に示すものではない模式） -->
  <g fill="none" stroke="#dcebf3" stroke-width="2">
    <path d="M0,150 C220,110 400,170 620,130 S900,150 960,120"/>
    <path d="M0,200 C240,165 430,220 640,180 S910,205 960,175"/>
    <path d="M0,255 C260,225 450,270 660,235 S920,260 960,235"/>
  </g>

  <!-- 旧東海道：地区を貫く街道のうねり（抽象） -->
  <path d="M-20,430 C180,360 300,470 480,400 C660,330 780,450 980,380"
        fill="none" stroke="url(#mskRoad)" stroke-width="34" stroke-linecap="round"/>
  <path d="M-20,430 C180,360 300,470 480,400 C660,330 780,450 980,380"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="2 16" opacity="0.8"/>

  <!-- 宿場の家並み（旧東海道沿いの抽象的な町家の屋根） -->
  <g fill="#7faec9" stroke="#4f7f9b" stroke-width="1.4">
    <g transform="translate(150,392) rotate(-14)">
      <path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="20"/>
    </g>
    <g transform="translate(205,402) rotate(-12)">
      <path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="20"/>
    </g>
    <g transform="translate(262,407) rotate(-6)">
      <path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="20"/>
    </g>
    <g transform="translate(560,378) rotate(8)">
      <path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="20"/>
    </g>
    <g transform="translate(618,392) rotate(11)">
      <path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="20"/>
    </g>
  </g>

  <!-- 寺社の記憶：丘の上の鳥居（府八幡宮・見付天神などを想起させる抽象表現） -->
  <g>
    <path d="M360,300 q60,-70 120,0 Z" fill="#dcecae" stroke="#b9d186" stroke-width="1.5"/>
    <g stroke="#9c5a3c" stroke-width="6" stroke-linecap="round">
      <line x1="408" y1="250" x2="408" y2="300"/>
      <line x1="452" y1="250" x2="452" y2="300"/>
      <line x1="394" y1="252" x2="466" y2="252"/>
      <line x1="398" y1="266" x2="462" y2="266"/>
    </g>
  </g>

  <!-- 学校の記憶：擬洋風の建物（旧見付学校を想起させる抽象表現） -->
  <g transform="translate(690,250)">
    <rect x="0" y="40" width="120" height="60" fill="#eef6fb" stroke="#5a93ad" stroke-width="2"/>
    <rect x="20" y="20" width="80" height="24" fill="#eef6fb" stroke="#5a93ad" stroke-width="2"/>
    <rect x="42" y="2" width="36" height="20" fill="#eef6fb" stroke="#5a93ad" stroke-width="2"/>
    <rect x="54" y="-12" width="12" height="16" fill="#c98a3a" stroke="#9c5a3c" stroke-width="1.5"/>
    <g fill="#bcd6e6">
      <rect x="14" y="56" width="14" height="20"/><rect x="38" y="56" width="14" height="20"/>
      <rect x="62" y="56" width="14" height="20"/><rect x="86" y="56" width="14" height="20"/>
    </g>
  </g>

  <!-- 最小限のラベル（詳細は本文で説明） -->
  <g font-family="'Shippori Mincho',serif" fill="#3f6175">
    <text x="44" y="470" font-size="20" letter-spacing="2">旧東海道</text>
    <text x="190" y="358" font-size="16" letter-spacing="2" fill="#4f7f9b">見付宿</text>
    <text x="386" y="330" font-size="15" letter-spacing="2" fill="#6a7c4a">寺社</text>
    <text x="724" y="372" font-size="15" letter-spacing="2" fill="#4f7f9b">学校</text>
  </g>

  <text x="930" y="516" text-anchor="end" font-family="sans-serif" font-size="12"
        fill="#8aa4b3" letter-spacing="1">磐田物語 ｜ 見付地区 記憶の模式図</text>
</svg>

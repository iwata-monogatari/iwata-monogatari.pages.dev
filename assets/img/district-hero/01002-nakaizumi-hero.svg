<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img"
     aria-label="中泉地区の天領の陣屋・町並み・近代の駅の記憶を表した模式図">
  <defs>
    <linearGradient id="nkzSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3fafd"/>
      <stop offset="1" stop-color="#fffdf7"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#nkzSky)"/>

  <!-- 抽象的な地形の等高線（地理を正確に示すものではない模式） -->
  <g fill="none" stroke="#dcebf3" stroke-width="2">
    <path d="M0,140 C220,108 410,160 620,126 S900,146 960,116"/>
    <path d="M0,196 C240,164 430,212 640,176 S910,200 960,170"/>
    <path d="M0,250 C260,222 450,262 660,230 S920,256 960,232"/>
  </g>

  <!-- 近代の鉄道（駅のまちの記憶）：抽象的な線路 -->
  <g>
    <path d="M-20,470 C220,430 520,470 980,418" fill="none" stroke="#aecbdd" stroke-width="20" stroke-linecap="round"/>
    <path d="M-20,470 C220,430 520,470 980,418" fill="none" stroke="#ffffff" stroke-width="2"/>
    <g stroke="#7faec9" stroke-width="3">
      <line x1="60" y1="452" x2="66" y2="476"/><line x1="150" y1="446" x2="156" y2="470"/>
      <line x1="240" y1="444" x2="246" y2="468"/><line x1="330" y1="446" x2="336" y2="470"/>
      <line x1="430" y1="450" x2="436" y2="474"/><line x1="540" y1="454" x2="546" y2="478"/>
      <line x1="650" y1="452" x2="656" y2="476"/><line x1="760" y1="446" x2="766" y2="470"/>
      <line x1="860" y1="438" x2="866" y2="462"/>
    </g>
  </g>

  <!-- 駅舎（近代化の入口） -->
  <g transform="translate(120,372)">
    <rect x="0" y="22" width="118" height="48" fill="#eef6fb" stroke="#5a93ad" stroke-width="2"/>
    <path d="M-6,22 L59,2 L124,22 Z" fill="#cfe3ee" stroke="#5a93ad" stroke-width="2"/>
    <g fill="#bcd6e6"><rect x="14" y="36" width="16" height="22"/><rect x="40" y="36" width="16" height="22"/><rect x="66" y="36" width="16" height="22"/><rect x="92" y="36" width="16" height="22"/></g>
  </g>

  <!-- 天領の陣屋・御殿（門と塀の抽象） -->
  <g transform="translate(430,250)">
    <!-- 塀 -->
    <rect x="-30" y="64" width="220" height="12" fill="#e7eedd" stroke="#b9c79e" stroke-width="1.5"/>
    <!-- 門 -->
    <g stroke="#9c5a3c" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="40" y1="30" x2="40" y2="64"/>
      <line x1="120" y1="30" x2="120" y2="64"/>
    </g>
    <path d="M22,30 L80,8 L138,30 Z" fill="#cdb079" stroke="#9c5a3c" stroke-width="2"/>
    <rect x="70" y="40" width="20" height="24" fill="#7c5a3a"/>
  </g>

  <!-- 町並み（商業のまちの抽象的な家並み） -->
  <g fill="#7faec9" stroke="#4f7f9b" stroke-width="1.4">
    <g transform="translate(660,300)"><path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="22"/></g>
    <g transform="translate(710,306)"><path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="22"/></g>
    <g transform="translate(760,300)"><path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="22"/></g>
    <g transform="translate(810,306)"><path d="M0,18 L18,0 L36,18 Z"/><rect x="3" y="18" width="30" height="22"/></g>
  </g>

  <!-- 最小限のラベル（詳細は本文で説明） -->
  <g font-family="'Shippori Mincho',serif" fill="#3f6175">
    <text x="120" y="356" font-size="15" letter-spacing="2" fill="#4f7f9b">駅</text>
    <text x="452" y="246" font-size="15" letter-spacing="2" fill="#8a6a3c">陣屋・御殿</text>
    <text x="690" y="288" font-size="15" letter-spacing="2" fill="#4f7f9b">町並み</text>
  </g>

  <text x="930" y="516" text-anchor="end" font-family="sans-serif" font-size="12"
        fill="#8aa4b3" letter-spacing="1">磐田物語 ｜ 中泉地区 記憶の模式図</text>
</svg>

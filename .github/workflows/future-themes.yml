name: Future Themes Automation

on:
  push:
    branches: [main]
    paths:
      - 'data/future-themes.json'
      - 'scripts/create-deepreach-prompts.js'
      - 'scripts/validate-future-themes.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate future-themes.json
        run: node scripts/validate-future-themes.js

      - name: Generate DeepReach prompts
        run: node scripts/create-deepreach-prompts.js

      - name: Commit generated prompts
        run: |
          git config user.name "iwata-monogatari-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prompts/
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: sync DeepReach prompts from future-themes.json [skip ci]"
          git push
